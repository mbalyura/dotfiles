### List of plugins ###
set -g @plugin 'tmux-plugins/tpm' #tmux plugin manager
set -g @plugin 'tmux-plugins/tmux-sensible' #set of tmux options that should be acceptable to everyone
set -g @plugin 'tmux-plugins/tmux-yank' #system clipboard
# Force tmux-yank to use X clipboard.
set -g @override_copy_command 'xclip -i -selection clipboard'
# Use clipboard instead of primary selection.
set -g @yank_selection 'clipboard'
set -g @yank_selection_mouse 'clipboard'

### Restore after reboot! ###
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-boot 'on'
set -g @continuum-restore 'on'
# set -g @continuum-systemd-start-cmd 'tmux a'
# restore programs from list
# set -g @resurrect-processes 'nano micro'
set -g @resurrect-capture-pane-contents 'on'


