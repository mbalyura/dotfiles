### GENERAL ###
# New prefix
set -g prefix C-Space
set -g prefix2 C-b
bind C-Space send-prefix
set -g mouse on
# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
# set-option -sa terminal-overrides ",xterm*:Tc"
set-option -g default-terminal "xterm-256color"
# Setting escape time delay to be smaller to make tmux more responsive to commands
set -s escape-time 1


### NAVIGATION ###
# Use Alt-arrow keys WITHOUT PREFIX KEY to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Use Alt-Ctrl-arrows to resize panes
bind -n C-M-Left resize-pane -L 5
bind -n C-M-Right resize-pane -R 5
bind -n C-M-Up resize-pane -U 5
bind -n C-M-Down resize-pane -D 5

#open new pane in current working directory
bind v split-window -v -c "#{pane_current_path}"
bind h split-window -h -c "#{pane_current_path}"
bind x kill-pane
bind g setw synchronize-panes #Toggle sync panes

# Alt-Shift arrows to switch windows
bind -n M-S-left  previous-window
bind -n M-S-right next-window

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

bind r command-prompt -I "#W" "rename-window -- '%%'"
bind k kill-window

# Switch between two last windows
bind-key Tab last-window


### COPY PASTE ###
#Escape copy-mode
bind C-v paste-buffer
# bind Y copy-mode
set -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle
# set -g set-clipboard off
# Copy selected text to the system clipboard.
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -i -selection clipboard"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -i -selection clipboard"
bind-key -T copy-mode-vi C-m send-keys -X copy-pipe-and-cancel "xclip -i -selection clipboard"
bind-key -T copy-mode Enter send-keys -X copy-pipe-and-cancel "xclip -i -selection clipboard"
bind-key -T copy-mode C-m send-keys -X copy-pipe-and-cancel "xclip -i -selection clipboard"
# Mouse selection should use clipboard too.
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -i -selection clipboard"



# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
